<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Formulir Pendaftaran Ekstrakurikuler Pesantren</title>
  </head>
  <body>
    <h2>Formulir Pendaftaran Ekstrakurikuler Pesantren</h2>
    <form action="#" method="post" enctype="multipart/form-data">
      <!-- Bagian Identitas -->
      <p>
        <label for="nama">Nama Lengkap:</label><br />
        <input
          type="text"
          id="nama"
          name="nama"
          placeholder="Masukkan nama lengkap"
          required
        />
      </p>

      <p>
        <label for="email">Email Orang Tua/Wali:</label><br />
        <input
          type="email"
          id="email"
          name="email"
          placeholder="contoh: wali@email.com"
          required
        />
      </p>

      <p>
        <label for="telepon">Nomor Telepon/WA:</label><br />
        <input type="tel" id="telepon" name="telepon" required />
      </p>

      <p>
        <label for="tgl_lahir">Tanggal Lahir:</label><br />
        <input type="date" id="tgl_lahir" name="tgl_lahir" />
      </p>

      <p>
        Jenis Kelamin:<br />
        <input
          type="radio"
          id="laki"
          name="gender"
          value="Laki-laki"
          required
        />
        <label for="laki">Laki-laki</label><br />
        <input type="radio" id="perempuan" name="gender" value="Perempuan" />
        <label for="perempuan">Perempuan</label>
      </p>

      <!-- Bagian Pilihan Ekstrakurikuler -->
      <h3>Pilihan Ekstrakurikuler</h3>
      <p>
        Ekstrakurikuler yang diminati:<br />
        <input type="checkbox" id="ekskul1" name="ekskul[]" value="Tahfidz" />
        <label for="ekskul1">Tahfidz</label><br />
        <input type="checkbox" id="ekskul2" name="ekskul[]" value="Kaligrafi" />
        <label for="ekskul2">Kaligrafi</label><br />
        <input type="checkbox" id="ekskul3" name="ekskul[]" value="Hadrah" />
        <label for="ekskul3">Hadrah</label><br />
        <input type="checkbox" id="ekskul4" name="ekskul[]" value="Pramuka" />
        <label for="ekskul4">Pramuka</label>
      </p>

      <p>
        <label for="kelas">Kelas/Tingkat Saat Ini:</label><br />
        <select id="kelas" name="kelas" required>
          <option value="">--Pilih Kelas--</option>
          <option value="VII">VII (Kelas 1 SMP)</option>
          <option value="VIII">VIII (Kelas 2 SMP)</option>
          <option value="IX">IX (Kelas 3 SMP)</option>
          <option value="X">X (Kelas 1 SMA)</option>
        </select>
      </p>

      <p>
        <label for="motivasi">Alasan/Motivasi Mengikuti Ekskul:</label><br />
        <textarea
          id="motivasi"
          name="motivasi"
          rows="4"
          cols="40"
          placeholder="Tuliskan motivasi Anda..."
        ></textarea>
      </p>

      <!-- Bagian Tambahan -->
      <h3>Bagian Tambahan (Opsional)</h3>
      <p>
        <label for="foto">Unggah Foto Santri:</label><br />
        <input type="file" id="foto" name="foto" />
      </p>

      <p>
        <input type="checkbox" id="persetujuan" name="persetujuan" required />
        <label for="persetujuan"
          >Saya menyetujui tata tertib ekstrakurikuler pesantren</label
        >
      </p>

      <p>
        <input type="submit" value="Daftar Sekarang" />
      </p>
    </form>
  </body>
</html>
